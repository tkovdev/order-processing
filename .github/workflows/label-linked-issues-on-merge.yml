name: Label Linked Issues on Merge

on:
  pull_request:
    types: [closed]

jobs:
  label_issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Add api-ready label to linked issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request?.number;

            if (!prNumber) {
              core.info("No pull request number found in payload.");
              return;
            }

            const query = `
              query($owner: String!, $repo: String!, $number: Int!, $cursor: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 50, after: $cursor) {
                      nodes {
                        number
                        labels(first: 100) {
                          nodes {
                            name
                          }
                        }
                      }
                      pageInfo {
                        hasNextPage
                        endCursor
                      }
                    }
                  }
                }
              }
            `;

            const linkedIssues = [];
            let cursor = null;
            let hasNextPage = true;

            while (hasNextPage) {
              const result = await github.graphql(query, {
                owner,
                repo,
                number: prNumber,
                cursor,
              });

              const refs = result.repository.pullRequest.closingIssuesReferences;
              linkedIssues.push(...refs.nodes);
              hasNextPage = refs.pageInfo.hasNextPage;
              cursor = refs.pageInfo.endCursor;
            }

            if (linkedIssues.length === 0) {
              core.info(`No linked issues found for PR #${prNumber}.`);
              return;
            }

            for (const issue of linkedIssues) {
              const labels = issue.labels.nodes.map((label) => label.name);
              const isBackendIssue = labels.includes("back-end");
              const hasApiReadyLabel = labels.includes("api-ready");

              if (!isBackendIssue) {
                core.info(`Skipping issue #${issue.number}: not labeled back-end.`);
                continue;
              }

              if (hasApiReadyLabel) {
                core.info(`Issue #${issue.number} already has api-ready label.`);
                continue;
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: ["api-ready"],
              });

              core.info(`Added api-ready label to issue #${issue.number}.`);
            }
