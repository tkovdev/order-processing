name: Close Linked Issues On PR Approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  issues: write
  pull-requests: read
  contents: read

jobs:
  close-linked-issues:
    runs-on: ubuntu-latest
    if: >
      github.event.review.state == 'approved' &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false

    steps:
      - name: Close linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            const requiredIssueLabels = ["back-end", "api-ready"];

            // Optional safety gate: only run when PR has label auto-close-on-approval
            const hasGateLabel = (pr.labels || []).some(l => (l.name || "").toLowerCase() === "auto-close-on-approval");
            if (!hasGateLabel) {
              core.info("PR missing label auto-close-on-approval. Skipping.");
              return;
            }

            // Collect text sources to parse issue refs
            const texts = [];
            if (pr.title) texts.push(pr.title);
            if (pr.body) texts.push(pr.body);

            // Include commit messages so "Fixes #123" in commits also works
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });
            for (const c of commits) {
              if (c.commit && c.commit.message) texts.push(c.commit.message);
            }

            const joined = texts.join("\n\n");

            // Match closing keywords + issue numbers
            // Examples: closes #12, fix #34, resolves #56
            const re = /\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi;
            const issueNumbers = new Set();
            let m;
            while ((m = re.exec(joined)) !== null) {
              issueNumbers.add(Number(m[3]));
            }

            if (issueNumbers.size === 0) {
              core.info("No linked issues found via closing keywords.");
              return;
            }

            for (const issue_number of issueNumbers) {
              // Skip if already closed
              const issue = await github.rest.issues.get({ owner, repo, issue_number });
              if (issue.data.state === "closed") {
                core.info(`Issue #${issue_number} already closed.`);
                continue;
              }

              // Only auto-close issues explicitly marked for backend->frontend handoff.
              const issueLabelNames = (issue.data.labels || [])
                .map(l => typeof l === "string" ? l : (l.name || ""))
                .map(name => name.toLowerCase());

              const hasRequiredLabels = requiredIssueLabels.every(label => issueLabelNames.includes(label));
              if (!hasRequiredLabels) {
                core.info(
                  `Skipping issue #${issue_number}: missing one or more required labels (${requiredIssueLabels.join(", ")}).`
                );
                continue;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `Closed automatically because PR #${pr.number} was approved.`
              });

              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                state: "closed"
              });

              core.info(`Closed issue #${issue_number}.`);
            }