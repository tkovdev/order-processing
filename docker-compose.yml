services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qg
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3300:3300"
    environment:
      - PORT=3300
      - MONGODB_URI=mongodb://mongodb:27017/order-processing
      - KAFKA_BROKER=kafka:29092
    networks:
      - app-network
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "http://localhost:3300/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  orders:
    build:
      context: ./containers/orders
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKER=kafka:29092
      - DOCKER_NETWORK=order-processing_app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    depends_on:
      kafka:
        condition: service_healthy
      api: 
        condition: 
          service_healthy
    restart: on-failure

  sales:
    build:
      context: ./containers/sales
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKER=kafka:29092
      - DOCKER_NETWORK=order-processing_app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    depends_on:
      kafka:
        condition: service_healthy
      api: 
        condition: 
          service_healthy
    restart: on-failure

  shipping:
    build:
      context: ./containers/shipping
      dockerfile: Dockerfile
    environment:
      - KAFKA_BROKER=kafka:29092
      - DOCKER_NETWORK=order-processing_app-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network
    depends_on:
      kafka:
        condition: service_healthy
      api: 
        condition: 
          service_healthy
    restart: on-failure

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
